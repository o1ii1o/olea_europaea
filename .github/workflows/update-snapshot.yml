name: Update Market Snapshot

on:
  schedule:
    # Run every hour Mon-Fri during extended market hours (11:00-21:00 UTC)
    - cron: '0 11-21 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data and update HTML
        run: python update_snapshot.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet index.html && echo "No changes" && exit 0
          git add index.html
          git commit -m "Update Market Snapshot data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
